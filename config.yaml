# Cloud SRE Agent — sample configuration.
# Environment overrides use the SRE_ prefix with __ for nesting, e.g.
#   SRE_LLM__MODEL=gemini-2.5-pro  ->  llm.model
#   SRE_OUTPUT__DIR=/var/patches   ->  output.dir

sources:
  - type: file
    path: ./testdata/sample.log
  # Pub/Sub source: pulls Cloud Logging LogEntry JSON from a pull subscription.
  # Wire a Cloud Logging sink to a Pub/Sub topic, then point this at the topic's
  # pull subscription. Authentication uses ambient GCP credentials (ADC).
  # HIPAA: raw message payloads are never logged — only message IDs and counts.
  # - type: pubsub
  #   project_id: my-gcp-project
  #   subscription_id: sre-agent-logs-sub

llm:
  provider: gemini
  model: gemini-2.5-flash
  # Backend selects the Google API. "vertex" (Vertex AI) is the default and the
  # only BAA-eligible / HIPAA-covered option; it requires project + location.
  # "gemini-api" is the consumer Gemini Developer API and is NOT covered by
  # Google's BAA — it is refused at startup unless explicitly opted in (see
  # allow_non_baa / SRE_ALLOW_NON_BAA below).
  backend: vertex
  project: my-gcp-project
  location: us-central1
  # Used only by the gemini-api backend. The API key is read from this
  # environment variable, never stored here.
  api_key_env: GEMINI_API_KEY
  # Explicit, auditable acknowledgement required to use the non-BAA gemini-api
  # backend. Either this bool or the env var SRE_ALLOW_NON_BAA=1 must be set.
  # allow_non_baa: false

output:
  dir: ./out

# Delivery target: where a remediation is delivered.
#   local  — write the patch and a JSON metadata sidecar under output.dir (default).
#   github — open a real pull request against the repository below.
#   gitlab — open a real merge request against the project below.
target: local

# GitHub delivery target (used only when target: github). The access token is
# NEVER stored here — it is read from the GITHUB_TOKEN environment variable at
# startup and is never logged. owner and repo are required when target: github.
github:
  owner: my-org
  repo: my-repo
  # Branch PRs target and branch from; defaults to "main".
  base_branch: main

# GitLab delivery target (used only when target: gitlab). The access token is
# NEVER stored here — it is read from the GITLAB_TOKEN environment variable at
# startup and is never logged. project is required when target: gitlab.
gitlab:
  # Project path ("group/repo") or numeric project ID.
  project: my-group/my-repo
  # Branch MRs target and branch from; defaults to "main".
  base_branch: main
  # API base URL for self-managed GitLab; omit (or leave blank) for gitlab.com.
  # base_url: https://gitlab.example.com

# Code validator: gates an LLM-generated patch before it is delivered.
#   none   — accept every patch (default).
#   local  — validate Go patches with the local toolchain (parse, gofmt, go vet).
validator: none

log:
  level: info
  format: json

# Tracing selects the OpenTelemetry span exporter.
#   none       — spans are recorded in the SDK but not exported (default).
#   stdout     — spans are written to the process's log writer (local debug).
#   cloudtrace — spans are exported to Google Cloud Trace (requires project).
# HIPAA: span attributes must be sanitized before recording — raw log content,
# prompts, and error strings can carry PHI.
tracing:
  exporter: none
  # project: my-gcp-project  # required only for the cloudtrace exporter
